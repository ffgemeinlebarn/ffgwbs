name: Build & Deploy Workflow

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  build-production:
    name: "Build and Publish"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: "npm"

      - name: "[npm] Install Dependencies"
        run: npm ci

      - name: "[npm] Build"
        run: npm run build:production

      - name: "[publish] Artifact for Test"
        uses: actions/upload-artifact@v7
        with:
          name: Production
          path: ./public/
